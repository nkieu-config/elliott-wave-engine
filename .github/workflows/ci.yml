name: CI

on:
  push:
    branches: [main]
  pull_request:

# One run per ref; a new push cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }} — ruff + layers + pytest (cov ≥ 75%)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "${{ matrix.python-version }}"
          enable-cache: true

      # dev = pytest/ruff/cov, api = fastapi. NOT grounding (torch ~440MB):
      # the embedder is optional and its tests skip when it's absent.
      - run: uv sync --extra dev --extra api

      - name: Lint
        run: uv run ruff check .

      - name: Type-check
        run: uv run mypy engine analyst infra apps

      # Fails on any upward import across apps → infra → analyst → engine.
      - name: Check architecture layers
        run: uv run lint-imports

      # apps/web/openapi.json is the committed wire contract the web's types are
      # generated from. Change a response model without regenerating it and the
      # web keeps compiling against a shape the API no longer sends.
      - name: Check the wire contract is current
        run: |
          uv run python apps/web/scripts/dump-openapi.py > apps/web/openapi.json
          git diff --exit-code --stat apps/web/openapi.json \
            || { echo "::error::openapi.json is stale — run apps/web/scripts/dump-openapi.py and commit, then 'npm run gen:api-types' in apps/web"; exit 1; }

      # --cov applies the pyproject coverage config (branch + fail_under = 75).
      - name: Test
        run: uv run pytest --cov

      # Known-vulnerability scan of the resolved dependency tree.
      - name: Audit dependencies
        run: uvx pip-audit

  web:
    name: Web — tsc + eslint + vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      # lib/api-types.gen.ts must match the committed openapi.json; type-check then
      # fails wherever the app reads a field the API no longer sends.
      - name: Check generated wire types are current
        run: |
          npm run gen:api-types
          git diff --exit-code --stat lib/api-types.gen.ts \
            || { echo "::error::lib/api-types.gen.ts is stale — run 'npm run gen:api-types' and commit"; exit 1; }

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      # Catches production-only failures (RSC boundaries, static-gen) tsc/vitest miss.
      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      # Gate on high/critical only: the moderate advisories are transitive dev-only
      # and their fixes are breaking-change bumps.
      - name: Audit dependencies
        run: npm audit --audit-level=high

  docker:
    name: Docker — compose build (README quick-start)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # The README's headline command is `docker compose up --build`; build both
      # images so a broken Dockerfile / lockfile drift fails CI, not a first-time user.
      - name: Validate compose file
        run: docker compose config -q

      - name: Build images
        run: docker compose build
