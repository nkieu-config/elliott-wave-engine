name: CI

on:
  push:
    branches: [main]
  pull_request:

# One run per ref; a new push cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }} — ruff + pytest (cov ≥ 75%)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "${{ matrix.python-version }}"
          enable-cache: true

      # dev = pytest/ruff/cov, api = fastapi. NOT grounding (torch ~440MB):
      # the embedder is optional and its tests skip when it's absent.
      - run: uv sync --extra dev --extra api

      - name: Lint
        run: uv run ruff check .

      # --cov applies the pyproject coverage config (branch + fail_under = 75).
      - name: Test
        run: uv run pytest --cov

  web:
    name: Web — tsc + eslint + vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      # Catches production-only failures (RSC boundaries, static-gen) tsc/vitest miss.
      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
